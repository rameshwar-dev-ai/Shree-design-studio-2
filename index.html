<div id="root"></div>

        return <i ref={iconRef} data-lucide={name} className={className}></i>;
    };

                    <span className="text-xl md:text-2xl font-serif font-bold tracking-[0.15em] uppercase text-champagne leading-none">Shree Design Studio</span>
                    <span className="text-[9px] tracking-[0.6em] uppercase text-white/30 mt-1">Architectural Excellence</span>
                </a>
                <div className="hidden md:flex items-center space-x-12 text-[10px] uppercase tracking-[0.3em] font-medium">
                    <a href="#projects" className="text-white/40 hover:text-champagne transition-colors">Portfolio</a>
                    <a href="#blog" className="text-white/40 hover:text-champagne transition-colors">Journal</a>
                    <a href="#contact" className="text-champagne border-b border-champagne/30 pb-1 hover:border-champagne transition-all">Contact</a>

        <section className="min-h-[85vh] flex items-center justify-center text-center px-6 pt-32">

                initial={{ opacity: 0, y: 30 }} 
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 1.2 }}
            >

                    Defining the <br/>
                    <span className="italic font-serif premium-gradient-text">Modern Skyline</span>
                </h1>
                <p className="text-white/40 max-w-lg mx-auto mb-14 text-sm font-light leading-relaxed tracking-widest uppercase">
                    Bespoke interiors and structural mastery curated for the discerning few in Rourkela.
                </p>
                <div className="flex justify-center">
                    <a href="#projects" className="group flex flex-col items-center gap-4">
                        <span className="text-[10px] uppercase tracking-[0.5em] text-champagne-dark">Discover</span>
                        <div className="w-[1px] h-16 bg-gradient-to-b from-champagne-dark to-transparent group-hover:h-24 transition-all duration-700"></div>
                    </a>
                </div>
            </motion.div>
        </section>
    );

    const Projects = () => {
        const galleryItems = [
            { img: "./house1.png", title: "Project Obsidian", desc: "Residential Exterior" },
            { img: "./kitchen3.png", title: "The Gilded Galley", desc: "Premium Kitchen" },
            { img: "./bedroom.png", title: "Ethereal Rest", desc: "Master Suite" },
            { img: "./kitchen1.png", title: "Monolith Cooking", desc: "Industrial Design" },
            { img: "./bedroom1.png", title: "Ivory Sanctuary", desc: "Minimalist Living" },
            { img: "./fan1.png", title: "The Detail Lab", desc: "Curated Fixtures" }

            <section id="projects" className="py-32 px-6">

                    <div className="text-center mb-24">
                        <span className="text-[10px] uppercase tracking-[0.5em] text-champagne-dark block mb-4">Curated Works</span>

                            </div>

                    </div>
                </div>
            </section>
        );
    };

    const Contact = () => {

        const handleWhatsApp = (e) => {

                        />
                        <input 
                            type="text" placeholder="Project Location" required
                            className="w-full bg-transparent border-b border-white/10 py-4 outline-none focus:border-champagne transition-all text-sm placeholder:text-white/10"

                        />
                        <textarea 
                            placeholder="Brief Overview of Vision" rows="2" required
                            className="w-full bg-transparent border-b border-white/10 py-4 outline-none focus:border-champagne transition-all text-sm resize-none placeholder:text-white/10"

                            Send Request
                        </button>
                    </form>
                </div>
            </section>
        );
    };

    const App = () => (
        <div className="selection:bg-champagne selection:text-obsidian">
            <Navbar />
            <Hero />
            <Projects />
            <Blog />
            <Contact />
            <footer className="py-20 text-center">
                <p className="text-[9px] uppercase tracking-[0.5em] text-white/20">© 2026 Shree Design Studio • Rourkela, Odisha</p>
            </footer>
        </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
