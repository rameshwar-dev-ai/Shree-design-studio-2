<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Design Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>

<script src="https://unpkg.com/lucide@latest"></script>

<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    sans: ["Inter", "sans-serif"],
                    serif: ["Playfair Display", "serif"],
                },
                colors: {
                    charcoal: '#121212',
                    'charcoal-light': '#1E1E1E',
                    'navy-dark': '#0A0F1E',
                    gold: '#D4AF37',
                    'gold-light': '#F1D592',
                    'gold-dark': '#A68926',
                },
            }
        }
    }
</script>

<style type="text/css">
    body {
        background: linear-gradient(135deg, #121212 0%, #0A0F1E 100%);
        background-attachment: fixed;
        color: white;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
    }
    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }
    .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F1D592 50%, #A68926 100%); }
    .gold-text-gradient {
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        background-image: linear-gradient(135deg, #D4AF37 0%, #F1D592 50%, #A68926 100%);
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .icon-glow { filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5)); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #121212; }
    ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = Motion;

    const Icon = ({ name, size = 24, className = "" }) => {
        const iconRef = useRef(null);
        useEffect(() => {
            if (iconRef.current) {
                const icon = lucide.icons[name];
                if (icon) {
                    lucide.createIcons({
                        icons: { [name]: icon },
                        attrs: { stroke: "currentColor", "stroke-width": 2, width: size, height: size, class: className }
                    });
                }
            }
        }, [name, size, className]);
        return <i ref={iconRef} data-lucide={name} className={className}></i>;
    };

    const Navbar = () => (
        <nav className="fixed top-0 left-0 w-full z-50 bg-white/10 backdrop-blur-md py-4 border-b border-white/20">
            <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                <a href="#" className="text-2xl font-serif font-bold gold-text-gradient tracking-tighter">SHREE</a>
                <div className="hidden md:flex items-center space-x-8 text-sm font-medium text-white/70">
                    <a href="#about" className="hover:text-gold">About</a>
                    <a href="#services" className="hover:text-gold">Services</a>
                    <a href="#contact" className="px-5 py-2 rounded-full border border-gold/50 text-gold hover:bg-gold hover:text-charcoal transition-all">Get Started</a>
                </div>
            </div>
        </nav>
    );

    const Hero = () => (
        <section className="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden">
            <div className="max-w-7xl mx-auto px-6 relative z-10 text-center">
                <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }}>
                    <h1 className="text-6xl md:text-8xl font-serif font-bold mb-6 leading-tight">
                        Shree <span className="gold-text-gradient italic">Design</span> Studio
                    </h1>
                    <p className="text-xl md:text-2xl text-white/60 max-w-2xl mx-auto mb-10 font-light">
                        Innovative Design Meets AI Excellence. We craft premium digital experiences that define the future.
                    </p>
                    <div className="flex gap-4 justify-center">
                        <a href="#contact" className="px-8 py-4 rounded-full gold-gradient text-charcoal font-bold text-lg">Get Started</a>
                    </div>
                </motion.div>
            </div>
        </section>
    );

    const About = () => (
        <section id="about" className="py-24 relative overflow-hidden">
            <div className="max-w-7xl mx-auto px-6">
                <div className="grid md:grid-cols-2 gap-16 items-center">
                    <motion.div initial={{ opacity: 0, x: -50 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }}>
                        <h2 className="text-4xl md:text-5xl font-serif font-bold mb-8">
                            Crafting the <span className="gold-text-gradient">Digital Future</span>
                        </h2>
                        <p className="text-lg text-white/70 mb-6 leading-relaxed">
                            Shree Design Studio is a boutique creative agency where artistry meets cutting-edge technology. We specialize in delivering premium digital products that perform exceptionally.
                        </p>
                    </motion.div>
                    <div className="aspect-square rounded-2xl overflow-hidden border border-white/20 glass-card">
                        <img src="https://picsum.photos/seed/studio/800/800" className="w-full h-full object-cover grayscale opacity-80" />
                    </div>
                </div>
            </div>
        </section>
    );

    const Services = () => (
        <section id="services" className="py-24 relative">
            <div className="max-w-7xl mx-auto px-6">
                <div className="text-center mb-16">
                    <h2 className="text-4xl md:text-5xl font-serif font-bold mb-4">Our Core <span className="gold-text-gradient">Capabilities</span></h2>
                </div>
                <div className="grid md:grid-cols-3 gap-8 text-center">
                    {[1, 2, 3].map((i) => (
                        <div key={i} className="p-10 rounded-3xl glass-card flex flex-col items-center justify-center min-h-[250px]">
                            <h3 className="text-2xl font-serif font-bold">Project</h3>
                        </div>
                    ))}
                </div>
            </div>
        </section>
    );

    const Contact = () => (
        <section id="contact" className="py-24">
            <div className="max-w-7xl mx-auto px-6">
                <div className="grid lg:grid-cols-2 gap-16">
                    <div>
                        <h2 className="text-4xl md:text-5xl font-serif font-bold mb-8">Let's <span className="gold-text-gradient">Connect</span></h2>
                        <div className="space-y-6">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 rounded-full bg-gold/10 flex items-center justify-center text-gold"><Icon name="Phone" /></div>
                                <div><p className="text-xs text-white/40 uppercase tracking-widest">Call Us</p><p className="text-lg font-medium">+91 7978535165</p></div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 rounded-full bg-gold/10 flex items-center justify-center text-gold"><Icon name="MapPin" /></div>
                                <div><p className="text-xs text-white/40 uppercase tracking-widest">Address</p><p className="text-lg font-medium">Civil Township, Taporaj Panigrahi Marg, Rourkela, Odisha 769012</p></div>
                            </div>
                        </div>
                        <div className="mt-12">
                            <a href="https://wa.me/917978535165" className="inline-flex items-center gap-3 px-8 py-4 rounded-full bg-[#25D366] text-white font-bold"><Icon name="MessageSquare" /> Chat on WhatsApp</a>
                        </div>
                    </div>
                    
                    <div className="p-8 md:p-12 rounded-3xl glass-card">
                        <form className="space-y-6" onSubmit={(e) => e.preventDefault()}>
                            <div className="space-y-2">
                                <label className="text-sm font-medium text-white/60">Full Name</label>
                                <input type="text" className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none" placeholder="" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-sm font-medium text-white/60">Your Message</label>
                                <textarea rows={4} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none" placeholder="Tell us about your project..." />
                            </div>
                            <button type="submit" className="w-full py-4 rounded-xl gold-gradient text-charcoal font-bold text-lg">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    );

    const App = () => (
        <div className="min-h-screen">
            <Navbar />
            <main><Hero /><About /><Services /><Contact /></main>
            <footer className="py-12 border-t border-white/10 text-center text-white/40 text-sm">
                <p>© 2026 Shree Design Studio. All rights reserved.</p>
            </footer>
        </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
