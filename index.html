    <title>Shree Design Studio | Premium Web Design & AI Solutions</title>
    <meta name="description" content="Shree Design Studio provides premium digital solutions, high-end web design, and AI agent development. Located in Rourkela, Odisha.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Montserrat", "sans-serif"],
                        serif: ["Cormorant Garamond", "serif"],
                    },
                    colors: {
                        stone: '#F9F9F7',
                        clay: '#1C1C1C',
                        gold: '#B59431',
                        'gold-light': '#D4AF37',
                        'gold-dark': '#8C7023',
                    },
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            background-color: #F9F9F7;
            color: #1C1C1C;
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
        }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
        .gold-text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(135deg, #B59431 0%, #D4AF37 50%, #8C7023 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
        }

            width: 100%;
            height: 100%;
            object-fit: cover;
        }

<div id="root"></div>

    const { useState, useEffect, useRef } = React;
    const { motion } = Motion;

        const iconRef = useRef(null);
        useEffect(() => {
            if (iconRef.current && lucide.icons[name]) {
                lucide.createIcons({
                    icons: { [name]: lucide.icons[name] },
                    attrs: { stroke: "currentColor", "stroke-width": 1.5, width: size, height: size, class: className }
                });
            }
        }, [name]);
        return <i ref={iconRef} data-lucide={name} className={className}></i>;
    };

    const Navbar = () => (
        <nav className="fixed top-0 left-0 w-full z-50 nav-blur py-5 border-b border-black/5">
            <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                <a href="#" className="flex items-center space-x-2">
                    <Icon name="building-2" className="text-gold" size={28} />
                    <span className="text-xl md:text-2xl font-serif font-bold text-clay uppercase tracking-widest">Shree Design Studio</span>
                </a>
                <div className="hidden md:flex items-center space-x-10 text-[11px] font-bold uppercase tracking-[0.2em] text-clay/60">
                    <a href="#projects" className="hover:text-gold transition-colors">Projects</a>
                    <a href="#blog" className="hover:text-gold transition-colors">Insights</a>
                    <a href="#contact" className="px-6 py-2 rounded-full border border-clay text-clay hover:bg-clay hover:text-stone transition-all">Contact</a>
                </div>
            </div>
        </nav>
    );

    const Hero = () => (
        <section className="min-h-[100vh] flex items-center justify-center text-center px-6">
            <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }}>
                <span className="text-gold font-bold tracking-[0.3em] text-xs uppercase mb-4 block">Architectural Excellence</span>
                <h1 className="text-6xl md:text-9xl font-bold mb-8 leading-tight text-clay">
                    Elevating <span className="italic font-serif serif">Spaces</span>
                </h1>
                <p className="text-clay/60 max-w-2xl mx-auto mb-12 text-lg md:text-xl font-light leading-relaxed">
                    Where structural integrity meets artistic vision. We create premium architectural and interior masterpieces in Rourkela.
                </p>
                <div className="flex flex-col md:flex-row justify-center gap-6">
                    <a href="#projects" className="px-12 py-4 bg-clay text-stone font-medium transition-all hover:bg-gold">View Portfolio</a>
                    <a href="#blog" className="px-12 py-4 border border-clay/20 hover:border-clay transition-all text-clay font-medium">Read Journal</a>
                </div>
            </motion.div>
        </section>
    );

    const Projects = () => {
        const galleryItems = [
            { vid: "./bedroom.mp4", title: "Modern Master Suite", desc: "Minimalist Interior" },
            { vid: "./bedroom1.mp4", title: "Luxury Living", desc: "Bespoke Design" },
            { vid: "./bedroom3.mp4", title: "Elegant Comfort", desc: "Spatial Planning" },
            { vid: "./kitchen.mp4", title: "Gourmet Kitchen", desc: "Modern Cabinetry" },
            { vid: "./kitchen1.mp4", title: "Culinary Space", desc: "Premium Finishes" }
        ];

        return (
            <section id="projects" className="py-32 px-6 bg-white">
                <div className="max-w-7xl mx-auto">
                    {/* Updated Header: Centered layout */}
                    <div className="flex flex-col items-center text-center mb-20">
                        <div className="max-w-xl">
                            <h2 className="text-5xl font-serif font-bold mb-6 text-clay">Our <span className="italic">Portfolio</span></h2>
                            <p className="text-clay/50 italic font-serif text-xl">Curated works of spatial excellence.</p>
                        </div>
                        {/* Decorative line centered below the text */}
                        <div className="h-[1px] w-24 bg-clay/10 mt-8"></div>
                    </div>

                                key={i} 
                                initial={{ opacity: 0, y: 20 }}
                                whileInView={{ opacity: 1, y: 0 }}
                                viewport={{ once: true }}
                                className="group relative overflow-hidden w-full md:w-[calc(50%-2.5rem)] lg:w-[calc(33.33%-2.5rem)]"
                            >
                                <div className="aspect-[4/5] overflow-hidden bg-stone">
                                    <video 
                                        autoPlay 
                                        loop 
                                        muted 
                                        playsInline
                                        className="opacity-90 group-hover:opacity-100 transition-all duration-1000 group-hover:scale-110"
                                    >
                                        <source src={item.vid} type="video/mp4" />
                                    </video>
                                </div>
                                <div className="py-6 border-b border-clay/5">
                                    <h3 className="text-2xl font-serif text-clay group-hover:text-gold transition-colors">{item.title}</h3>
                                    <p className="text-clay/40 text-xs uppercase tracking-widest mt-1">{item.desc}</p>
                                </div>
                            </motion.div>
                        ))}
                    </div>
                </div>
            </section>
        );
    };

    const Blog = () => {
        const posts = [
            {
                date: "March 15, 2026",
                title: "The Future of Sustainable Design",
                desc: "Exploring how modern architecture integrates green energy and biophilic elements into urban residential spaces.",
                category: "Innovation"
            },
            {
                date: "Feb 28, 2026",
                title: "Maximizing Small Urban Spaces",
                desc: "Strategic interior design techniques to make compact city living feel expansive and luxurious without compromising utility.",
                category: "Interior Tips"
            },
            {
                date: "Jan 12, 2026",
                title: "Lighting: The Hidden Language",
                desc: "How architectural lighting transforms the mood of a room and defines the character of structural materials at night.",
                category: "Structural"
            }
        ];

        return (
            <section id="blog" className="py-32 px-6">
                <div className="max-w-7xl mx-auto">
                    <div className="text-center mb-24">

                                <p className="text-clay/60 text-sm leading-relaxed mb-8 line-clamp-3">{post.desc}</p>
                                <div className="flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-clay/30 border-t border-clay/5 pt-6">

                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );
    };

    const Contact = () => {
        const [formData, setFormData] = useState({ name: "", address: "", message: "" });

            e.preventDefault();
            const { name, address, message } = formData;

        };

            setFormData({ ...formData, [e.target.name]: e.target.value });
        };

        return (

                        </div>
                    </div>

                                <div className="border-b border-clay/10 focus-within:border-gold transition-all py-2">
                                    <label className="text-[10px] uppercase font-bold tracking-widest text-clay/40">Your Name</label>
                                    <input 
                                        type="text" name="name" required
                                        className="w-full bg-transparent outline-none pt-2 text-clay"
                                        onChange={handleChange}
                                    />
                                </div>
                                <div className="border-b border-clay/10 focus-within:border-gold transition-all py-2">
                                    <label className="text-[10px] uppercase font-bold tracking-widest text-clay/40">Location</label>
                                    <input 
                                        type="text" name="address" required
                                        className="w-full bg-transparent outline-none pt-2 text-clay"
                                        onChange={handleChange}
                                    />
                                </div>
                            </div>
                            <div className="border-b border-clay/10 focus-within:border-gold transition-all py-2">
                                <label className="text-[10px] uppercase font-bold tracking-widest text-clay/40">Project Details</label>
                                <textarea 
                                    name="message" rows="3" required
                                    className="w-full bg-transparent outline-none pt-2 text-clay resize-none"
                                    onChange={handleChange}
                                ></textarea>
                            </div>
                            <button className="px-12 py-4 bg-clay text-stone font-bold hover:bg-gold transition-all uppercase text-xs tracking-[0.2em]">
                                Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </section>
        );
    };

    const App = () => (
        <div className="overflow-hidden">
            <Navbar />
            <Hero />
            <Projects />
            <Blog />
            <Contact />
            <footer className="py-20 text-center bg-stone border-t border-clay/5">
                <div className="mb-8">
                    <Icon name="building-2" size={24} className="mx-auto mb-4 text-gold" />
                    <span className="font-serif text-2xl font-bold tracking-tighter text-clay">SHREE DESIGN STUDIO</span>
                </div>
                <p className="text-clay/30 text-[10px] font-bold uppercase tracking-[0.3em]">© 2026 | Architectural Excellence in Rourkela, Odisha</p>
            </footer>
        </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

                        <h2 className="text-5xl font-serif font-bold mb-8 text-clay">Let's <br/><span className="italic">Connect</span></h2>
                        <p className="text-clay/50 leading-relaxed mb-8">Ready to transform your space? Drop us a message and our lead architect will get back to you.</p>
                        <div className="space-y-4 text-sm font-medium">
                            <p className="flex items-center gap-3"><Icon name="map-pin" size={18} className="text-gold" /> Rourkela, Odisha</p>
                            <p className="flex items-center gap-3"><Icon name="mail" size={18} className="text-gold" /> hello@shreedesign.com</p>
                        </div>
                    </div>
                    <div className="md:w-2/3">
                        <form onSubmit={handleWhatsApp} className="space-y-8">
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="border-b border-clay/10 focus-within:border-gold transition-all py-2">
                                    <label className="text-[10px] uppercase font-bold tracking-widest text-clay/40">Your Name</label>
                                    <input 
                                        type="text" name="name" required
                                        className="w-full bg-transparent outline-none pt-2 text-clay"
                                        onChange={handleChange}
                                    />
                                </div>
                                <div className="border-b border-clay/10 focus-within:border-gold transition-all py-2">
                                    <label className="text-[10px] uppercase font-bold tracking-widest text-clay/40">Location</label>
                                    <input 
                                        type="text" name="address" required
                                        className="w-full bg-transparent outline-none pt-2 text-clay"
                                        onChange={handleChange}
                                    />
                                </div>
                            </div>
                            <div className="border-b border-clay/10 focus-within:border-gold transition-all py-2">
                                <label className="text-[10px] uppercase font-bold tracking-widest text-clay/40">Project Details</label>
                                <textarea 
                                    name="message" rows="3" required
                                    className="w-full bg-transparent outline-none pt-2 text-clay resize-none"
                                    onChange={handleChange}
                                ></textarea>
                            </div>
                            <button className="px-12 py-4 bg-clay text-stone font-bold hover:bg-gold transition-all uppercase text-xs tracking-[0.2em]">
                                Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </section>
        );
    };

    const App = () => (
        <div className="overflow-hidden">
            <Navbar />
            <Hero />
            <Projects />
            <Blog />
            <Contact />
            <footer className="py-20 text-center bg-stone border-t border-clay/5">
                <div className="mb-8">
                    <Icon name="building-2" size={24} className="mx-auto mb-4 text-gold" />
                    <span className="font-serif text-2xl font-bold tracking-tighter text-clay">SHREE DESIGN STUDIO</span>
                </div>
                <p className="text-clay/30 text-[10px] font-bold uppercase tracking-[0.3em]">© 2026 | Architectural Excellence in Rourkela, Odisha</p>
            </footer>
        </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
