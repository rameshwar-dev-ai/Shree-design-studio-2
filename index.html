<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Shree Design Studio | Premium Web Design & AI Solutions</title>
    <meta name="description" content="Shree Design Studio provides premium digital solutions, high-end web design, and AI agent development. Located in Rourkela, Odisha.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        serif: ["Playfair Display", "serif"],
                    },
                    colors: {
                        charcoal: '#121212',
                        gold: '#D4AF37',
                        'gold-light': '#F1D592',
                        'gold-dark': '#A68926',
                    },
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            background: linear-gradient(135deg, #121212 0%, #0A0F1E 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .gold-text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(135deg, #D4AF37 0%, #F1D592 50%, #A68926 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion } = Motion;

    const Icon = ({ name, size = 24, className = "" }) => {
        const iconRef = useRef(null);
        useEffect(() => {
            if (iconRef.current && lucide.icons[name]) {
                lucide.createIcons({
                    icons: { [name]: lucide.icons[name] },
                    attrs: { stroke: "currentColor", "stroke-width": 2, width: size, height: size, class: className }
                });
            }
        }, [name]);
        return <i ref={iconRef} data-lucide={name} className={className}></i>;
    };

    const Navbar = () => (
        <nav className="fixed top-0 left-0 w-full z-50 bg-black/40 backdrop-blur-lg py-4 border-b border-white/10">
            <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                <a href="#" className="flex items-center space-x-2">
                    <Icon name="building-2" className="text-gold" size={28} />
                    <span className="text-xl md:text-2xl font-serif font-bold gold-text-gradient uppercase tracking-tight">Shree Design Studio</span>
                </a>
                <div className="hidden md:flex items-center space-x-8 text-sm text-white/70">
                    <a href="#projects" className="hover:text-gold transition-colors">Projects</a>
                    <a href="#blog" className="hover:text-gold transition-colors">Insights</a>
                    <a href="#contact" className="px-5 py-2 rounded-full border border-gold/50 text-gold hover:bg-gold hover:text-charcoal transition-all">Contact</a>
                </div>
            </div>
        </nav>
    );

    const Hero = () => (
        <section className="min-h-[90vh] flex items-center justify-center text-center px-6 pt-20">
            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}>
                <h1 className="text-5xl md:text-8xl font-bold mb-6 leading-tight">
                    Elevating <span className="gold-text-gradient italic font-serif">Spaces</span>
                </h1>
                <p className="text-white/60 max-w-2xl mx-auto mb-10 text-lg md:text-xl font-light">
                    Where structural integrity meets artistic vision. We create premium architectural and interior masterpieces in Rourkela.
                </p>
                <div className="flex flex-col md:flex-row justify-center gap-4">
                    <a href="#projects" className="px-10 py-4 rounded-full bg-gradient-to-r from-gold to-gold-dark text-charcoal font-bold transition-transform hover:scale-105">View Portfolio</a>
                    <a href="#blog" className="px-10 py-4 rounded-full border border-white/20 hover:bg-white/10 transition-all">Read Journal</a>
                </div>
            </motion.div>
        </section>
    );

    const Projects = () => {
        const galleryItems = [
            { img: "./house1.png", title: "Modern Exterior", desc: "Architectural Design" },
            { img: "./kitchen3.png", title: "Luxury Kitchen", desc: "Interior Concept" },
            { img: "./bedroom.png", title: "Master Suite", desc: "Minimalist Decor" },
            { img: "./kitchen1.png", title: "Gourmet Space", desc: "Custom Cabinetry" },
            { img: "./bedroom1.png", title: "Bespoke Bedroom", desc: "Modern Living" },
            { img: "./fan1.png", title: "Designer Fixtures", desc: "Detailing" }
        ];

        return (
            <section id="projects" className="py-24 px-6 bg-black/30">
                <div className="max-w-7xl mx-auto">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl font-serif font-bold mb-4 italic">Our <span className="gold-text-gradient">Portfolio</span></h2>
                        <div className="h-1 w-24 bg-gold mx-auto opacity-50"></div>
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {galleryItems.map((item, i) => (
                            <motion.div 
                                key={i} 
                                whileHover={{ y: -10 }}
                                className="group relative overflow-hidden rounded-2xl glass-card border border-white/5"
                            >
                                <div className="aspect-[4/3] overflow-hidden bg-white/5">
                                    <img 
                                        src={item.img} 
                                        alt={item.title} 
                                        className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all duration-700 group-hover:scale-110" 
                                    />
                                </div>
                                <div className="p-6">
                                    <h3 className="text-xl font-serif text-gold">{item.title}</h3>
                                    <p className="text-white/40 text-sm">{item.desc}</p>
                                </div>
                            </motion.div>
                        ))}
                    </div>
                </div>
            </section>
        );
    };

    const Blog = () => {
        const posts = [
            {
                date: "March 15, 2026",
                title: "The Future of Sustainable Design",
                desc: "Exploring how modern architecture integrates green energy and biophilic elements into urban residential spaces.",
                category: "Innovation"
            },
            {
                date: "Feb 28, 2026",
                title: "Maximizing Small Urban Spaces",
                desc: "Strategic interior design techniques to make compact city living feel expansive and luxurious without compromising utility.",
                category: "Interior Tips"
            },
            {
                date: "Jan 12, 2026",
                title: "Lighting: The Hidden Language",
                desc: "How architectural lighting transforms the mood of a room and defines the character of structural materials at night.",
                category: "Structural"
            }
        ];

        return (
            <section id="blog" className="py-24 px-6">
                <div className="max-w-7xl mx-auto">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl font-serif font-bold mb-4 italic">Design <span className="gold-text-gradient">Insights</span></h2>
                        <p className="text-white/50">Thought leadership in modern architecture and spatial planning.</p>
                    </div>
                    <div className="grid md:grid-cols-3 gap-8">
                        {posts.map((post, idx) => (
                            <div key={idx} className="p-8 rounded-2xl glass-card hover:bg-white/10 transition-all group">
                                <span className="text-gold-dark text-xs font-bold uppercase tracking-widest">{post.category}</span>
                                <h3 className="text-2xl font-serif mt-3 mb-4 group-hover:text-gold-light transition-colors">{post.title}</h3>
                                <p className="text-white/60 text-sm leading-relaxed mb-6">{post.desc}</p>
                                <div className="flex justify-between items-center text-xs text-white/30 border-t border-white/10 pt-4">
                                    <span>{post.date}</span>
                                    <span className="hover:text-gold cursor-pointer">Read Full Article →</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );
    };

    const Contact = () => {
        const [formData, setFormData] = useState({
            name: "",
            address: "",
            message: ""
        });

        const handleWhatsApp = (e) => {
            e.preventDefault();
            const { name, address, message } = formData;
            const text = `*New Project Inquiry*%0A%0A*Name:* ${name}%0A*Address:* ${address}%0A*Message:* ${message}`;
            const url = `https://wa.me/917978535165?text=${text}`;
            window.open(url, '_blank');
        };

        const handleChange = (e) => {
            setFormData({ ...formData, [e.target.name]: e.target.value });
        };

        return (
            <section id="contact" className="py-24 px-6 bg-black/20">
                <div className="max-w-3xl mx-auto glass-card p-8 md:p-12 rounded-3xl border border-gold/20 shadow-2xl shadow-gold/5">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl md:text-4xl font-serif font-bold mb-4">Start a <span className="gold-text-gradient italic">Project</span></h2>
                        <p className="text-white/40">Share your vision with us and we'll bring it to life.</p>
                    </div>
                    <form onSubmit={handleWhatsApp} className="space-y-6">
                        <div className="grid md:grid-cols-2 gap-6">
                            <input 
                                type="text" name="name" placeholder="Your Name" required
                                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 outline-none focus:border-gold/50 transition-all"
                                onChange={handleChange}
                            />
                            <input 
                                type="text" name="address" placeholder="Project Address" required
                                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 outline-none focus:border-gold/50 transition-all"
                                onChange={handleChange}
                            />
                        </div>
                        <textarea 
                            name="message" placeholder="Describe your project (e.g., 3BHK Apartment, Office Interior, etc.)" rows="4" required
                            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 outline-none focus:border-gold/50 transition-all"
                            onChange={handleChange}
                        ></textarea>
                        <button className="w-full py-4 rounded-xl bg-gradient-to-r from-gold to-gold-dark text-charcoal font-bold text-lg hover:shadow-lg hover:shadow-gold/20 transition-all active:scale-[0.98]">
                            Send via WhatsApp
                        </button>
                    </form>
                </div>
            </section>
        );
    };

    const App = () => (
        <div className="overflow-hidden">
            <Navbar />
            <Hero />
            <Projects />
            <Blog />
            <Contact />
            <footer className="py-12 text-center text-white/20 text-sm border-t border-white/5">
                <div className="mb-4">
                    <Icon name="building-2" size={20} className="inline mr-2 opacity-50" />
                    <span className="font-serif">SHREE DESIGN STUDIO</span>
                </div>
                <p>© 2026 | Architectural Excellence in Rourkela, Odisha</p>
            </footer>
        </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
