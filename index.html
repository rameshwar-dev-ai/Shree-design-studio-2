<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Shree Design Studio | Premium Web Design & AI Solutions</title>
    <meta name="description" content="Shree Design Studio provides premium digital solutions, high-end web design, and AI agent development. Located in Rourkela, Odisha.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        serif: ["Playfair Display", "serif"],
                    },
                    colors: {
                        charcoal: '#121212',
                        gold: '#D4AF37',
                        'gold-light': '#F1D592',
                        'gold-dark': '#A68926',
                    },
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            background: linear-gradient(135deg, #121212 0%, #0A0F1E 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .gold-text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(135deg, #D4AF37 0%, #F1D592 50%, #A68926 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion } = Motion;

    const Icon = ({ name, size = 24, className = "" }) => {
        const iconRef = useRef(null);
        useEffect(() => {
            if (iconRef.current && lucide.icons[name]) {
                lucide.createIcons({
                    icons: { [name]: lucide.icons[name] },
                    attrs: { stroke: "currentColor", "stroke-width": 2, width: size, height: size, class: className }
                });
            }
        }, [name]);
        return <i ref={iconRef} data-lucide={name} className={className}></i>;
    };

    const Navbar = () => (
        <nav className="fixed top-0 left-0 w-full z-50 bg-black/20 backdrop-blur-lg py-4 border-b border-white/10">
            <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                <a href="#" className="text-2xl font-serif font-bold gold-text-gradient">SHREE</a>
                <div className="hidden md:flex items-center space-x-8 text-sm text-white/70">
                    <a href="#projects" className="hover:text-gold transition-colors">Projects</a>
                    <a href="#contact" className="px-5 py-2 rounded-full border border-gold/50 text-gold hover:bg-gold hover:text-charcoal transition-all">Contact</a>
                </div>
            </div>
        </nav>
    );

    const Hero = () => (
        <section className="min-h-[80vh] flex items-center justify-center text-center px-6 pt-20">
            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}>
                <h1 className="text-5xl md:text-7xl font-bold mb-6">
                    Elevating <span className="gold-text-gradient italic">Spaces</span>
                </h1>
                <p className="text-white/60 max-w-xl mx-auto mb-8 text-lg">
                    Premium architectural and interior design solutions by Shree Design Studio.
                </p>
                <a href="#projects" className="px-8 py-4 rounded-full bg-gradient-to-r from-gold to-gold-dark text-charcoal font-bold">Explore Work</a>
            </motion.div>
        </section>
    );

    const Projects = () => {
        // Using "./" ensures GitHub Pages looks in the current repository folder
        const galleryItems = [
            { img: "./house1.png", title: "Modern Exterior", desc: "Architectural Design" },
            { img: "./kitchen3.png", title: "Luxury Kitchen", desc: "Interior Concept" },
            { img: "./bedroom.png", title: "Master Suite", desc: "Minimalist Decor" },
            { img: "./kitchen1.png", title: "Gourmet Space", desc: "Custom Cabinetry" },
            { img: "./bedroom1.png", title: "Bespoke Bedroom", desc: "Modern Living" },
            { img: "./fan1.png", title: "Designer Fixtures", desc: "Detailing" }
        ];

        return (
            <section id="projects" className="py-24 px-6 bg-black/30">
                <div className="max-w-7xl mx-auto">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl font-serif font-bold mb-4">Our <span className="gold-text-gradient">Portfolio</span></h2>
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {galleryItems.map((item, i) => (
                            <motion.div 
                                key={i} 
                                whileHover={{ y: -10 }}
                                className="group relative overflow-hidden rounded-2xl glass-card"
                            >
                                <div className="aspect-[4/3] overflow-hidden bg-white/5">
                                    <img 
                                        src={item.img} 
                                        alt={item.title} 
                                        className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all duration-500" 
                                        onError={(e) => {
                                            // Fallback if the image still fails (checks for capitalization or missing files)
                                            console.error("Failed to load:", item.img);
                                            e.target.style.display = 'none';
                                        }}
                                    />
                                </div>
                                <div className="p-6">
                                    <h3 className="text-xl font-serif text-gold">{item.title}</h3>
                                    <p className="text-white/40 text-sm">{item.desc}</p>
                                </div>
                            </motion.div>
                        ))}
                    </div>
                </div>
            </section>
        );
    };

    const Contact = () => {
        const [name, setName] = useState("");
        const [message, setMessage] = useState("");

        const handleWhatsApp = (e) => {
            e.preventDefault();
            const url = `https://wa.me/917978535165?text=Name: ${name}%0AMessage: ${message}`;
            window.open(url, '_blank');
        };

        return (
            <section id="contact" className="py-24 px-6">
                <div className="max-w-3xl mx-auto glass-card p-10 rounded-3xl">
                    <h2 className="text-3xl font-serif font-bold mb-8 text-center">Start a <span className="gold-text-gradient">Project</span></h2>
                    <form onSubmit={handleWhatsApp} className="space-y-6">
                        <input 
                            type="text" placeholder="Your Name" required
                            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 outline-none focus:border-gold/50"
                            onChange={(e) => setName(e.target.value)}
                        />
                        <textarea 
                            placeholder="How can we help?" rows="4" required
                            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 outline-none focus:border-gold/50"
                            onChange={(e) => setMessage(e.target.value)}
                        ></textarea>
                        <button className="w-full py-4 rounded-xl bg-gradient-to-r from-gold to-gold-dark text-charcoal font-bold text-lg">
                            Send via WhatsApp
                        </button>
                    </form>
                </div>
            </section>
        );
    };

    const App = () => (
        <div>
            <Navbar />
            <Hero />
            <Projects />
            <Contact />
            <footer className="py-10 text-center text-white/20 text-xs border-t border-white/5">
                © 2026 Shree Design Studio | Rourkela, Odisha
            </footer>
        </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
