        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Plus Jakarta Sans", "sans-serif"],

                    colors: {
                        obsidian: '#05070A',
                        champagne: '#E5D5B8',
                        'champagne-dark': '#B89F71',
                        'slate-glass': 'rgba(255, 255, 255, 0.03)',
                    },
                }
            }
        }
    </script>

            background-color: #05070A;

<div id="root"></div>

            if (iconRef.current && lucide.icons[name]) {
                lucide.createIcons({
                    icons: { [name]: lucide.icons[name] },
                    attrs: { stroke: "currentColor", "stroke-width": 1.5, width: size, height: size, class: className }
                });
            }
        }, [name]);
        return <i ref={iconRef} data-lucide={name} className={className}></i>;
    };

    const Navbar = () => (
        <nav className="fixed top-0 left-0 w-full z-50 nav-blur py-5 border-b border-white/5">
            <div className="max-w-7xl mx-auto px-8 flex justify-between items-center">
                <a href="#" className="flex items-center space-x-3 group">
                    <div className="p-2 border border-champagne/20 group-hover:border-champagne/50 transition-colors">
                        <Icon name="layout" className="text-champagne" size={22} />
                    </div>
                    <span className="text-lg font-serif font-bold tracking-widest uppercase text-champagne">Shree Design</span>
                </a>
                <div className="hidden md:flex items-center space-x-10 text-[11px] uppercase tracking-[0.2em] font-medium">
                    <a href="#projects" className="text-white/50 hover:text-champagne transition-colors">Projects</a>
                    <a href="#blog" className="text-white/50 hover:text-champagne transition-colors">Insights</a>
                    <a href="#contact" className="px-6 py-2 border border-champagne/30 text-champagne hover:bg-champagne hover:text-obsidian transition-all duration-500">Inquiry</a>
                </div>
            </div>
        </nav>
    );

    const Hero = () => (
        <section className="min-h-screen flex items-center justify-center text-center px-6">
            <motion.div 
                initial={{ opacity: 0, y: 30 }} 
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 1 }}
            >
                <span className="text-[10px] uppercase tracking-[0.5em] text-champagne-dark mb-4 block">Est. 2026 • Rourkela</span>
                <h1 className="text-6xl md:text-9xl font-bold mb-8 leading-none">
                    Sculpting <br/>
                    <span className="italic font-serif premium-gradient-text">Atmospheres</span>
                </h1>
                <p className="text-white/40 max-w-xl mx-auto mb-12 text-sm md:text-base font-light leading-relaxed tracking-wide">
                    A boutique design firm dedicated to the intersection of structural precision and high-end aesthetic storytelling.
                </p>
                <div className="flex flex-col md:flex-row justify-center gap-6">
                    <a href="#projects" className="px-12 py-4 bg-champagne text-obsidian text-xs font-bold uppercase tracking-widest hover:bg-white transition-all">
                        Explore Works
                    </a>
                </div>
            </motion.div>
        </section>
    );

    const Projects = () => {
        const galleryItems = [
            { img: "./house1.png", title: "The Obsidian House", desc: "Architecture" },
            { img: "./kitchen3.png", title: "Champagne Lounge", desc: "Interior" },
            { img: "./bedroom.png", title: "Zenith Suite", desc: "Minimalist" },
            { img: "./kitchen1.png", title: "Culinary Studio", desc: "Technical" },
            { img: "./bedroom1.png", title: "Ethereal Living", desc: "Lifestyle" },
            { img: "./fan1.png", title: "Micro Details", desc: "Fixtures" }
        ];

                        <span className="text-champagne-dark text-[10px] uppercase tracking-widest mb-4">View All (12)</span>
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
                        {galleryItems.map((item, i) => (
                            <motion.div 
                                key={i} 
                                initial={{ opacity: 0 }}
                                whileInView={{ opacity: 1 }}
                                viewport={{ once: true }}
                                className="group cursor-pointer"
                            >
                                <div className="relative aspect-[3/4] overflow-hidden bg-white/5 mb-6">
                                    <img 
                                        src={item.img} 
                                        alt={item.title} 
                                        className="w-full h-full object-cover grayscale-[50%] group-hover:grayscale-0 transition-all duration-1000 scale-105 group-hover:scale-100" 
                                    />
                                    <div className="absolute inset-0 bg-obsidian/20 group-hover:bg-transparent transition-colors duration-500"></div>
                                </div>
                                <h3 className="text-lg font-serif text-champagne/90 mb-1 tracking-wide">{item.title}</h3>
                                <p className="text-white/30 text-[10px] uppercase tracking-[0.2em]">{item.desc}</p>
                            </motion.div>
                        ))}
                    </div>
                </div>
            </section>
        );
    };

    const Blog = () => {
        const posts = [
            {
                date: "2026",
                title: "The Poetics of Light",
                desc: "How shadow placement defines the luxury of a residence more than the materials themselves.",
                category: "Theory"
            },
            {
                date: "2026",
                title: "Urban Sanctuary",
                desc: "Finding silence in Rourkela's growing cityscape through sound-conscious architecture.",
                category: "Urban"
            },
            {
                date: "2026",
                title: "Future Heritage",
                desc: "Why we design homes to last three generations, not just three seasons.",

                            </div>

                </div>
            </section>
        );
    };

        const [formData, setFormData] = useState({ name: "", address: "", message: "" });

            e.preventDefault();
            const text = `*Inquiry for Shree Design*%0A%0A*Client:* ${formData.name}%0A*Loc:* ${formData.address}%0A*Note:* ${formData.message}`;

        };

        return (
            <section id="contact" className="py-32 px-6">
                <div className="max-w-4xl mx-auto glass-card p-12 md:p-20 relative overflow-hidden">

                        <div className="text-center mb-12">
                            <h2 className="text-4xl font-serif italic text-champagne mb-4">Let's Converse</h2>

                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                    />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] uppercase tracking-widest text-champagne-dark ml-1">Location</label>
                                    <input 
                                        type="text" required
                                        className="w-full bg-white/5 border-b border-white/10 px-0 py-3 outline-none focus:border-champagne transition-all text-sm"
                                        onChange={(e) => setFormData({...formData, address: e.target.value})}
                                    />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] uppercase tracking-widest text-champagne-dark ml-1">Project Description</label>
                                <textarea 
                                    rows="3" required
                                    className="w-full bg-white/5 border-b border-white/10 px-0 py-3 outline-none focus:border-champagne transition-all text-sm resize-none"
                                    onChange={(e) => setFormData({...formData, message: e.target.value})}
                                ></textarea>
                            </div>
                            <button className="w-full py-5 bg-champagne text-obsidian text-xs font-bold uppercase tracking-[0.3em] hover:bg-white transition-all duration-500 mt-4">
                                Initiate Consultation
                            </button>
                        </form>
                    </div>
                </div>
            </section>
        );

    const App = () => (
        <div className="selection:bg-champagne selection:text-obsidian">
            <Navbar />
            <Hero />
            <Projects />
            <Blog />
            <Contact />
            <footer className="py-20 text-center border-t border-white/5">
                <div className="flex items-center justify-center space-x-3 mb-6">
                    <div className="h-[1px] w-8 bg-champagne/20"></div>
                    <span className="font-serif italic text-champagne">SHREE DESIGN STUDIO</span>
                    <div className="h-[1px] w-8 bg-champagne/20"></div>
                </div>
                <p className="text-[10px] uppercase tracking-[0.4em] text-white/20">Crafting Excellence • Rourkela • Odisha</p>
            </footer>
        </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

        const [formData, setFormData] = useState({ name: "", address: "", message: "" });

        const handleWhatsApp = (e) => {
            e.preventDefault();
            const text = `*Inquiry for Shree Design*%0A%0A*Client:* ${formData.name}%0A*Loc:* ${formData.address}%0A*Note:* ${formData.message}`;
            window.open(`https://wa.me/917978535165?text=${text}`, '_blank');
        };

        return (
            <section id="contact" className="py-32 px-6">
                <div className="max-w-4xl mx-auto glass-card p-12 md:p-20 relative overflow-hidden">
                    <div className="relative z-10">
                        <div className="text-center mb-12">
                            <h2 className="text-4xl font-serif italic text-champagne mb-4">Let's Converse</h2>
                            <p className="text-white/30 text-sm tracking-widest uppercase">Transforming visions into structural reality</p>
                        </div>
                        <form onSubmit={handleWhatsApp} className="space-y-8">
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="space-y-2">
                                    <label className="text-[10px] uppercase tracking-widest text-champagne-dark ml-1">Full Name</label>
                                    <input 
                                        type="text" required
                                        className="w-full bg-white/5 border-b border-white/10 px-0 py-3 outline-none focus:border-champagne transition-all text-sm"
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                    />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] uppercase tracking-widest text-champagne-dark ml-1">Location</label>
                                    <input 
                                        type="text" required
                                        className="w-full bg-white/5 border-b border-white/10 px-0 py-3 outline-none focus:border-champagne transition-all text-sm"
                                        onChange={(e) => setFormData({...formData, address: e.target.value})}
                                    />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] uppercase tracking-widest text-champagne-dark ml-1">Project Description</label>
                                <textarea 
                                    rows="3" required
                                    className="w-full bg-white/5 border-b border-white/10 px-0 py-3 outline-none focus:border-champagne transition-all text-sm resize-none"
                                    onChange={(e) => setFormData({...formData, message: e.target.value})}
                                ></textarea>
                            </div>
                            <button className="w-full py-5 bg-champagne text-obsidian text-xs font-bold uppercase tracking-[0.3em] hover:bg-white transition-all duration-500 mt-4">
                                Initiate Consultation
                            </button>
                        </form>
                    </div>
                </div>
            </section>
        );
    };

    const App = () => (
        <div className="selection:bg-champagne selection:text-obsidian">
            <Navbar />
            <Hero />
            <Projects />
            <Blog />
            <Contact />
            <footer className="py-20 text-center border-t border-white/5">
                <div className="flex items-center justify-center space-x-3 mb-6">
                    <div className="h-[1px] w-8 bg-champagne/20"></div>
                    <span className="font-serif italic text-champagne">SHREE DESIGN STUDIO</span>
                    <div className="h-[1px] w-8 bg-champagne/20"></div>
                </div>
                <p className="text-[10px] uppercase tracking-[0.4em] text-white/20">Crafting Excellence • Rourkela • Odisha</p>
            </footer>
        </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
